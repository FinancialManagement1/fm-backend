name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore ./api/api.slnx

      - name: Build solution
        run: dotnet build ./api/api.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ./api/api.slnx --no-build --configuration Release --verbosity normal
